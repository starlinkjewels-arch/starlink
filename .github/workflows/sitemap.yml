name: Generate Sitemap

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate sitemap
        run: npm run generate:sitemap

      - name: Commit sitemap
        run: |
          if git diff --quiet; then
            echo "No sitemap changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml
          git commit -m "chore: update sitemap"
          git push

      - name: Ping search engines
        run: |
          SITEMAP_URL="https://www.starlinkjewels.com/sitemap.xml"
          curl -sS "https://www.google.com/ping?sitemap=${SITEMAP_URL}" >/dev/null || true
          curl -sS "https://www.bing.com/ping?sitemap=${SITEMAP_URL}" >/dev/null || true
